<!doctype html>
<html lang="en" dir="ltr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="./Styles/app.css" />
        <link rel="stylesheet" href="./Styles/Responsive.css" />
        <link rel="stylesheet" href="./Styles/font.css" />
        <title>BrandFlow</title>
    </head>
    <body>
        <div class="container">
            <!-- Header -->
            <header class="header">
                <div class="header__container">
                    <!-- Logo -->
                    <div class="header__logo">
                        <a href="#" class="header__logo-link">
                            <img src="./Images/LOGO.png" alt="BrandFlow" />
                        </a>
                    </div>
                    <!-- Nav -->
                    <nav class="nav">
                        <!-- Nav Items -->
                        <ul class="nav__items">
                            <li class="nav__item">
                                <a
                                    href=""
                                    class="nav__item-link nav__link-active"
                                    >Home</a
                                >
                            </li>
                            <li class="nav__items">
                                <a href="" class="nav__item-link"
                                    >Case Studies</a
                                >
                            </li>
                            <li class="nav__items">
                                <a href="" class="nav__item-link">Contact Us</a>
                            </li>
                        </ul>
                    </nav>
                    <!-- Header Center-->
                    <div class="header__center">
                        <!-- Header Button -->
                        <div class="header__button">
                            <a href="" class="header__button-link"
                                >Explore Partnership</a
                            >
                            <svg
                                xmlns="http://www.w3.org/2000/svg"
                                width="45"
                                height="45"
                                viewBox="0 0 45 45"
                                fill="none"
                            >
                                <circle
                                    cx="22.5"
                                    cy="22.5"
                                    r="22.5"
                                    fill="#FF4D00"
                                />
                                <path
                                    d="M19.9966 16.4168L28.9385 16.4168L28.9385 25.3588"
                                    stroke="#FAF3E1"
                                    stroke-width="1.5"
                                    stroke-miterlimit="10"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                />
                                <path
                                    d="M16.417 28.9385L28.8135 16.542"
                                    stroke="#FAF3E1"
                                    stroke-width="1.5"
                                    stroke-miterlimit="10"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                />
                            </svg>
                        </div>
                    </div>
                    <!-- Nav Mobile -->
                    <ul class="nav__mobile" id="nav__mobile">
                        <li class="nav__mobile-item">
                            <a href="#" class="nav__mobile-link"> Home </a>
                        </li>
                        <li class="nav__mobile-item">
                            <a href="#" class="nav__mobile-link">
                                Case Studies
                            </a>
                        </li>
                        <li class="nav__mobile-item">
                            <a href="#" class="nav__mobile-link">
                                Contact Us
                            </a>
                        </li>
                    </ul>
                    <!-- Humborger Menu-->
                    <button class="hamburger" id="hamburger-btn">
                        <span class="bar"></span>
                        <span class="bar"></span>
                        <span class="bar"></span>
                    </button>
                </div>
            </header>
            <!-- hero -->
            <section class="hero">
                <!-- Hero Text -->
                <div class="hero__text">
                    <h1 class="hero__text-title">
                        Build a Brand That <br />
                        Does the
                        <span class="highlight">Selling</span> For
                        <br />
                        You.
                    </h1>
                    <p class="hero__text-detailes">
                        Turning attention into revenue is the shortest path to
                        becoming the<br />
                        go‑to authority in your market. We build the engine; you
                        capture the<br />
                        growth.
                    </p>
                </div>
                <!-- Hero Video -->
                <div class="hero-video">
                    <img
                        src="./Images/Frame 1984078058.png"
                        alt="video cover"
                    />
                </div>
            </section>
        </div>
        <script src="./Js/main.js"></script>
    </body>
</html>
